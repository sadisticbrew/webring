<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>threadlocked · webring</title>
    <style>
      :root {
        /* rosé pine dawn (light) */
        --base: #faf4ed;
        --surface: #fffaf3;
        --overlay: #f2e9e1;
        --muted: #9893a5;
        --subtle: #797593;
        --text: #575279;
        --love: #b4637a;
        --gold: #ea9d34;
        --rose: #d7827e;
        --pine: #286983;
        --foam: #56949f;
        --iris: #907aa9;
        --highlight: #f4ede8;
        --radius: 0;
        --theme: var(--base);
        --tertiary: var(--muted);
        --secondary: var(--subtle);
      }
      :root[data-theme="dark"] {
        /* rosé pine (dark) */
        --base: #191724;
        --surface: #1f1d2e;
        --overlay: #26233a;
        --muted: #6e6a86;
        --subtle: #908caa;
        --text: #e0def4;
        --love: #eb6f92;
        --gold: #f6c177;
        --rose: #ebbcba;
        --pine: #31748f;
        --foam: #9ccfd8;
        --iris: #c4a7e7;
        --highlight: #21202e;
      }

      * { box-sizing: border-box; }

      ::-webkit-scrollbar-track {
          background: 0 0;
      }

      ::-webkit-scrollbar-thumb {
          background: var(--tertiary);
          border: 5px solid var(--theme);
          border-radius: var(--radius);
      }

      ::-webkit-scrollbar-thumb:hover {
          background: var(--secondary);
      }

      ::-webkit-scrollbar:not(.highlighttable, .highlight table, .gist .highlight) {
          background: var(--theme);
      }

      @media screen and (min-width: 768px) {
          ::-webkit-scrollbar {
              width: 19px;
              height: 11px;
          }
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--base);
        color: var(--text);
        font: 16px/1.6 ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        -webkit-font-smoothing: antialiased;
        transition: background 0.25s ease, color 0.25s ease;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 4rem 1.5rem 6rem;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      h1 {
        margin: 0 0 0.45rem;
        font-size: 1.9rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      h1 .ring { color: var(--iris); }

      .desc { margin: 0; color: var(--subtle); font-size: 1rem; max-width: 52ch; }
      .desc .count { color: var(--foam); }

      #toggle {
        flex: none;
        appearance: none;
        background: var(--surface);
        color: var(--subtle);
        border: 1px solid var(--overlay);
        border-radius: 0;
        padding: 0.45rem 0.6rem;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      }
      #toggle:hover { border-color: var(--iris); color: var(--iris); }

      .controls { margin-bottom: 1.5rem; }

      #search {
        width: 100%;
        appearance: none;
        background: var(--surface);
        color: var(--text);
        border: 3px solid var(--overlay);
        border-radius: 0;
        padding: 0.8rem 1rem;
        font: inherit;
        font-size: 1.05rem;
        margin-bottom: 0.9rem;
        transition: border-color 0.18s ease;
      }
      #search:focus { outline: none; border-color: var(--iris); }
      #search::placeholder { color: var(--muted); }

      .empty { color: var(--muted); font-size: 0.9rem; }

      .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 0.9rem;
      }
      .card[hidden] { display: none; }

      .card {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        padding: 1.15rem;
        border: 3px solid var(--overlay);
        border-radius: var(--radius);
        background: var(--surface);
        text-decoration: none;
        color: var(--text);
        overflow: hidden;
        transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
      }
      .card:hover {
        border-color: var(--iris);
        background: var(--highlight);
        transform: translateY(-2px);
      }
      .card:hover .name { color: var(--foam); }
      .card:hover .arrow { opacity: 1; transform: none; }

      .avatar {
        position: relative;
        width: 3rem;
        height: 3rem;
        display: grid;
        place-items: center;
        border-radius: 0;
        background: var(--overlay);
        color: var(--iris);
        font-size: 1.2rem;
        font-weight: 600;
        overflow: hidden;
      }
      .avatar img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 4px;
        background: var(--overlay);
      }
      .avatar img[data-failed] { display: none; }

      .meta { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
      .name {
        font-weight: 500;
        font-size: 1.05rem;
        transition: color 0.18s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .host {
        color: var(--muted);
        font-size: 0.85rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .arrow {
        position: absolute;
        top: 1rem;
        right: 1rem;
        color: var(--iris);
        opacity: 0;
        transform: translateX(-4px);
        transition: opacity 0.18s ease, transform 0.18s ease;
      }

      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--overlay);
        color: var(--muted);
        font-size: 0.8rem;
      }
      footer a { color: var(--pine); text-decoration: none; }
      footer a:hover { text-decoration: underline; }

      @media (max-width: 1024px) {
        .grid { grid-template-columns: repeat(5, 1fr); }
      }
      @media (max-width: 720px) {
        .grid { grid-template-columns: repeat(3, 1fr); }
      }
      @media (max-width: 480px) {
        main { padding: 2.5rem 1rem 4rem; }
        .grid { grid-template-columns: repeat(2, 1fr); gap: 0.65rem; }
        h1 { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>thread<span class="ring">locked</span></h1>
          <p class="desc">
            a webring of personal sites.
            <span class="count" id="count"><!--COUNT--></span>
          </p>
        </div>
        <button id="toggle" type="button" aria-label="Toggle theme"></button>
      </header>

      <div class="controls">
        <input
          id="search"
          type="search"
          placeholder="search members…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search members"
        />
      </div>

      <div class="grid" id="grid"><!--MEMBERS--></div>

      <p id="empty" class="empty" hidden>no members match.</p>

      <footer>
        a <a href="https://en.wikipedia.org/wiki/Webring">webring</a>.
        jump to a <a href="/random">random site</a> &middot; grab the
        <a href="/webring">json</a>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script>
      (function () {
        // ---- theme toggle ----
        var root = document.documentElement;
        var btn = document.getElementById("toggle");
        var icons = { dark: "☾", light: "☀" };

        function apply(theme) {
          root.dataset.theme = theme;
          btn.textContent = icons[theme];
          try { localStorage.setItem("theme", theme); } catch (e) {}
        }

        var saved;
        try { saved = localStorage.getItem("theme"); } catch (e) {}
        var prefersDark = window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        apply(saved || (prefersDark ? "dark" : "light"));

        btn.addEventListener("click", function () {
          apply(root.dataset.theme === "dark" ? "light" : "dark");
        });

        // ---- search over server-rendered cards ----
        var search = document.getElementById("search");
        var empty = document.getElementById("empty");

        var items = [].slice
          .call(document.querySelectorAll(".card"))
          .map(function (el) {
            return { name: el.dataset.name, el: el };
          });

        var fuse =
          typeof Fuse !== "undefined"
            ? new Fuse(items, {
                keys: ["name"],
                threshold: 0.1,
                ignoreLocation: true,
              })
            : null;

        search.addEventListener("input", function () {
          var q = search.value.trim();
          if (!q) {
            items.forEach(function (it) { it.el.hidden = false; });
            empty.hidden = true;
            return;
          }

          var matched;
          if (fuse) {
            matched = fuse.search(q).map(function (res) { return res.item; });
          } else {
            var lq = q.toLowerCase();
            matched = items.filter(function (it) {
              return it.name.toLowerCase().indexOf(lq) !== -1;
            });
          }

          items.forEach(function (it) {
            it.el.hidden = matched.indexOf(it) === -1;
          });
          empty.hidden = matched.length !== 0;
        });
      })();
    </script>
  </body>
</html>
